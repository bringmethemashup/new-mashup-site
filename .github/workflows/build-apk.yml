# Builds the Android APK with Capacitor and publishes it as a GitHub release
# (tag: app-latest). The site then links to the release download — no Play
# Store involved.
#
# How to run: automatically on every push to `main` (that touches app files),
# or manually via GitHub → Actions tab → "Build Android APK" → Run workflow.
#
# Signing: add two repository secrets (Settings → Secrets and variables →
# Actions) so every build has the SAME signature and installs update over
# each other:
#   ANDROID_KEYSTORE_B64  — contents of android-signing/KEYSTORE_BASE64.txt
#   ANDROID_KEYSTORE_PASS — contents of android-signing/KEYSTORE_PASSWORD.txt
# Without the secrets a debug-signed APK is built (works, but users must
# uninstall before installing an update).
name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'android-signing/**'
      - '.gitignore'

permissions:
  contents: write   # needed to create/update the release

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_B64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22   # Capacitor CLI requires Node >= 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Capacitor
        # @capgo/capacitor-media-session = native Android media session (notification
        # shade / lock screen / volume keys / Android Auto playback controls); its
        # major version tracks Capacitor's, so @latest stays compatible.
        run: npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest @capacitor/app@latest @capacitor/browser@latest @capgo/capacitor-media-session@latest

      - name: Assemble web assets (fallback bundle; app loads the live site)
        run: |
          mkdir -p www
          cp -r css js data icons index.html submit.html admin.html editor.html manifest.webmanifest sw.js app-version.txt www/

      - name: Add Android platform
        run: npx cap add android && npx cap sync android

      - name: Register Google-login deep-link scheme + media permissions in AndroidManifest
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const p = 'android/app/src/main/AndroidManifest.xml';
          let x = fs.readFileSync(p, 'utf8');

          // Android 14+ (targetSdk 34+) crashes with a SecurityException the moment
          // the media-session plugin starts its mediaPlayback foreground service
          // unless this permission is declared. The plugin's own manifest only
          // declares plain FOREGROUND_SERVICE, so we add the typed one here.
          // POST_NOTIFICATIONS lets the playback notification show on Android 13+.
          for (const perm of [
            'android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK',
            'android.permission.POST_NOTIFICATIONS',
          ]) {
            if (!x.includes(perm)) {
              x = x.replace(/(\s*)<application/, `$1<uses-permission android:name="${perm}" />$1<application`);
              console.log('Added permission ' + perm);
            }
          }

          const scheme = 'com.bringmethemashup.app';
          const filter = [
            '        <intent-filter>',
            '            <action android:name="android.intent.action.VIEW" />',
            '            <category android:name="android.intent.category.DEFAULT" />',
            '            <category android:name="android.intent.category.BROWSABLE" />',
            '            <data android:scheme="' + scheme + '" />',
            '        </intent-filter>',
          ].join('\n');
          if (x.includes('android:scheme="' + scheme + '"')) {
            console.log('Deep-link intent filter already present.');
          } else {
            // Insert just before the first </activity> (the MainActivity).
            x = x.replace('</activity>', filter + '\n        </activity>');
            fs.writeFileSync(p, x);
            console.log('Deep-link intent filter added for scheme ' + scheme);
          }
          EOF

      - name: Native YouTube player (in-app, bypasses YouTube bot wall)
        run: |
          set -e
          PKG=android/app/src/main/java/com/bringmethemashup/app
          cat > "$PKG/MainActivity.java" <<'JAVA'
          package com.bringmethemashup.app;
          import android.os.Bundle;
          import android.os.Handler;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.CookieManager;
          import android.webkit.JavascriptInterface;
          import android.content.Intent;
          import android.content.Context;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
          private boolean hooked = false;
          @Override
          public void onStart() {
          super.onStart();
          WebView wv = getBridge().getWebView();
          WebSettings s = wv.getSettings();
          s.setMediaPlaybackRequiresUserGesture(false);
          s.setDomStorageEnabled(true);
          String ua = s.getUserAgentString();
          if (ua != null && ua.contains("; wv")) s.setUserAgentString(ua.replace("; wv", ""));
          CookieManager cm = CookieManager.getInstance();
          cm.setAcceptCookie(true);
          cm.setAcceptThirdPartyCookies(wv, true);
          if (!hooked) { hooked = true; wv.addJavascriptInterface(new YtBridge(this), "AndroidYT"); wv.reload(); }
          final WebView fwv = wv;
          Handler h = new Handler(getMainLooper());
          Runnable inject = new Runnable() { public void run() { fwv.evaluateJavascript(YT_HOOK_JS, null); } };
          h.postDelayed(inject, 2500);
          h.postDelayed(inject, 6000);
          }
          public static class YtBridge {
          private final Context ctx;
          YtBridge(Context c) { ctx = c; }
          @JavascriptInterface
          public void open(String videoId, int start) {
          Intent i = new Intent(ctx, YtActivity.class);
          i.putExtra("videoId", videoId);
          i.putExtra("start", start);
          i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
          ctx.startActivity(i);
          }
          }
          private static final String YT_HOOK_JS =
          "(function(){"
          + "if(window.__ytNativeHook)return;window.__ytNativeHook=true;"
          + "function eid(s){try{var m=s.match(/\\/embed\\/([^?&#\\/]+)/);return m?m[1]:null;}catch(e){return null;}}"
          + "function hit(f){var s=f.src||'';if(!/youtube(-nocookie)?\\.com\\/embed\\//.test(s))return;var id=eid(s);if(!id)return;"
          + "var st=0,sm=s.match(/[?&]start=(\\d+)/);if(sm)st=parseInt(sm[1],10)||0;"
          + "try{f.src='about:blank';}catch(e){}try{f.remove();}catch(e){}"
          + "try{AndroidYT.open(id,st);}catch(e){}}"
          + "var o=new MutationObserver(function(ms){ms.forEach(function(m){[].forEach.call(m.addedNodes||[],function(n){"
          + "if(n&&n.tagName==='IFRAME')hit(n);else if(n&&n.querySelectorAll){[].forEach.call(n.querySelectorAll('iframe'),hit);}});});});"
          + "o.observe(document.documentElement,{childList:true,subtree:true});"
          + "[].forEach.call(document.querySelectorAll('iframe'),hit);"
          + "})();";
          }
          JAVA
          cat > "$PKG/YtActivity.java" <<'JAVA'
          package com.bringmethemashup.app;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import com.pierfrancescosoffritti.androidyoutubeplayer.core.player.YouTubePlayer;
          import com.pierfrancescosoffritti.androidyoutubeplayer.core.player.listeners.AbstractYouTubePlayerListener;
          import com.pierfrancescosoffritti.androidyoutubeplayer.core.player.views.YouTubePlayerView;
          public class YtActivity extends AppCompatActivity {
          private YouTubePlayerView playerView;
          @Override
          protected void onCreate(Bundle b) {
          super.onCreate(b);
          final String videoId = getIntent().getStringExtra("videoId");
          final int start = getIntent().getIntExtra("start", 0);
          playerView = new YouTubePlayerView(this);
          getLifecycle().addObserver(playerView);
          setContentView(playerView);
          playerView.addYouTubePlayerListener(new AbstractYouTubePlayerListener() {
          @Override
          public void onReady(YouTubePlayer yt) { yt.loadVideo(videoId, (float) start); }
          });
          }
          @Override
          protected void onDestroy() { if (playerView != null) playerView.release(); super.onDestroy(); }
          }
          JAVA
          node - <<'EOF'
          const fs=require('fs');const p='android/app/build.gradle';let x=fs.readFileSync(p,'utf8');
          const dep="implementation 'com.pierfrancescosoffritti.androidyoutubeplayer:core:12.1.0'";
          if(!x.includes('androidyoutubeplayer')){x=x.replace(/dependencies\s*\{/, m=>m+"\n    "+dep);fs.writeFileSync(p,x);console.log('added yt dep');}else{console.log('yt dep present');}
          EOF
          node - <<'EOF'
          const fs=require('fs');const p='android/app/src/main/AndroidManifest.xml';let x=fs.readFileSync(p,'utf8');
          if(!x.includes('YtActivity')){x=x.replace('</application>', '    <activity android:name=".YtActivity" android:exported="false" android:configChanges="orientation|screenSize|keyboardHidden|screenLayout|smallestScreenSize" />\n    </application>');fs.writeFileSync(p,x);console.log('registered YtActivity');}else{console.log('YtActivity present');}
          EOF

      - name: Stamp app version (from app-version.txt) into the APK
        run: |
          VERSION=$(tr -d '[:space:]' < app-version.txt)
          echo "Stamping versionName=$VERSION versionCode=${{ github.run_number }}"
          sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" android/app/build.gradle
          sed -i "s/versionCode [0-9][0-9]*/versionCode ${{ github.run_number }}/" android/app/build.gradle

      - name: Generate app icons
        run: |
          mkdir -p assets
          cp icons/icon-1024.png assets/icon-only.png
          npx @capacitor/assets generate --android --iconBackgroundColor '#0e0f13' --splashBackgroundColor '#0e0f13' || echo "icon generation skipped"

      - name: Decode signing keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: |
          CLEAN=$(printf '%s' "${{ secrets.ANDROID_KEYSTORE_B64 }}" | tr -d '[:space:]')
          echo "cleaned base64 length: ${#CLEAN} (expected 3632)"
          printf '%s' "$CLEAN" | base64 -d -i > android/app/bmtm-release.keystore
          echo "keystore bytes: $(wc -c < android/app/bmtm-release.keystore) (expected 2724)"

      - name: Build APK
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: |
          cd android
          if [ "$HAS_KEYSTORE" = "true" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$PWD/app/bmtm-release.keystore \
              -Pandroid.injected.signing.store.password="$KS_PASS" \
              -Pandroid.injected.signing.key.alias=bmtm \
              -Pandroid.injected.signing.key.password="$KS_PASS"
            cp app/build/outputs/apk/release/app-release.apk ../bring-me-the-mashup.apk
          else
            ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk ../bring-me-the-mashup.apk
          fi

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bring-me-the-mashup-apk
          path: bring-me-the-mashup.apk

      - name: Publish to release "app-latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-latest
          name: Bring Me The Mashup — Android app
          body: |
            Download **bring-me-the-mashup.apk** below and open it on your Android
            phone to install (allow "install from unknown sources" when asked).
            iPhone users: open the website in Safari → Share → Add to Home Screen.
          files: bring-me-the-mashup.apk
